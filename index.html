<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Auto Email</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .error-text {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutIntro 0.5s ease-in-out 11s forwards;
        }
        
        .intro-text {
            color: #fff;
            font-size: 2em;
            text-align: center;
            font-weight: 300;
            padding: 20px;
            max-width: 600px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .intro-text h2 {
            font-size: 1.2em;
            font-weight: 400;
            line-height: 1.6;
            margin: 0;
        }
        
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #fff;
            margin-left: 5px;
            vertical-align: middle;
            line-height: 1;
            animation: blink 0.7s infinite;
        }
        
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        
        @keyframes fadeOutIntro {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .intro-text {
                font-size: 1.2em;
            }
            
            .intro-text h2 {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="intro">
        <div class="intro-text">
            <h2 id="typingText"></h2>
        </div>
    </div>
    
    <div class="container">
        <h1>Khai nhanhhhh</h1>
        <p class="subtitle">Mình muốn bắt chuyện với cậu mà mình chẳng biết gì về cậu cả </p>
        
        <form id="contactForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name" class="required">Tớ có thể gọi cậu là </label>
                    <input type="text" id="name" placeholder="muhehehe" required>
                    <div class="error-text" id="nameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="phone" class="required">Tớ có thể liên hệ với cậu chứ  </label>
                    <input type="tel" id="phone" placeholder="muhehehe" required>
                    <div class="error-text" id="phoneError"></div>
                </div>
            </div>
            
             <div class="form-group">
                <label for="address" class="required">Cậu đang sống ở đâu thế  </label>
                <input type="text" id="address" placeholder="muhehehe" required>
                <div class="error-text" id="addressError"></div>
            
            <div class="form-group">
                <label for="song">Bài hát yêu thích của cậu</label>
                <input type="text" id="song" placeholder="muhehehe...">
                <div class="error-text" id="songError"></div>
            </div>
            
            <div class="form-group">
                <label for="movie">Bộ phim yêu thích của cậu</label>
                <input type="text" id="movie" placeholder="muhehehe...">
                <div class="error-text" id="movieError"></div>
            </div>
            
            <div class="form-group">
                <label for="message">Sở thích của cậu là gì?</label>
                <textarea id="message" placeholder="muhehehe..."></textarea>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Gửi cho tớ</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Gửi cho tớ </p>
        </div>
        
        <div class="message success" id="successMessage">
            muheheehehehehehehehhehehehhehehehehehehehehhehehehhehehehehehehehehhehehehhehehehe
        </div>
        
        <div class="message error" id="errorMessage">
            lỗi òi để tớ thử lại nhé
        </div>
        
        <footer>
            <p>Thông tin này sẽ chỉ gửi đến tớ và sẽ không bị lộ thông tin đến bất kỳ ai khác đâu :) </p>
        </footer>
    </div>

    <!-- Include EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script>
        // Typing animation for intro
        const textToType = "Hi chào cậu 💕\n\nMình muốn bắt chuyện với cậu mà mình chẳng biết gì về cậu cả 😊\n Hay là cậu cậu có thể điền vào form này để tớ có thể bắt chuyện với cậu nhé 😊";
        const typingText = document.getElementById('typingText');
        let index = 0;
        const typingSpeed = 50; // milliseconds per character
        const cursor = '<span class="typing-cursor"></span>';
        
        function typeText() {
            if (index < textToType.length) {
                if (textToType[index] === '\n') {
                    typingText.innerHTML = typingText.innerHTML.replace(cursor, '') + '<br>' + cursor;
                } else {
                    typingText.innerHTML = typingText.innerHTML.replace(cursor, '') + textToType[index] + cursor;
                }
                index++;
                setTimeout(typeText, typingSpeed);
            } else {
                // Remove cursor when done
                typingText.innerHTML = typingText.innerHTML.replace(cursor, '');
            }
        }
        
        // Start typing animation when page loads
        window.addEventListener('load', function() {
            typeText();
        });
        
        // Initialize EmailJS
        (function() {
            emailjs.init("ZSyyJzJ81ijEh2-Tp"); // Replace with your EmailJS public key
        })();
        
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('contactForm');
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            // Error elements
            const nameError = document.getElementById('nameError');
            const phoneError = document.getElementById('phoneError');
            const addressError = document.getElementById('addressError');
            const songError = document.getElementById('songError');
            const movieError = document.getElementById('movieError');
            
            // Your EmailJS service and template IDs
            const SERVICE_ID = 'service_eq976yq'; // Replace with your EmailJS service ID
            const TEMPLATE_ID = 'template_wzk8xaq'; // Replace with your EmailJS template ID
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (!validateForm()) {
                    return;
                }
                
                showLoading();
                
                try {
                    // Get form data
                    const formData = {
                        name: document.getElementById('name').value.trim(),
                        phone: document.getElementById('phone').value.trim(),
                        address: document.getElementById('address').value.trim(),
                        song: document.getElementById('song').value.trim(),
                        movie: document.getElementById('movie').value.trim(),
                        message: document.getElementById('message').value.trim(),
                        timestamp: new Date().toLocaleString('vi-VN'),
                        userAgent: navigator.userAgent,
                        ip: 'Fetching...' // Note: Client-side IP detection is limited
                    };
                    
                    // Send email using EmailJS
                    const response = await emailjs.send(
                        SERVICE_ID,
                        TEMPLATE_ID,
                        {
                            to_email: 'trinhnangduc2006@gmail.com', // Your email
                            from_name: formData.name,
                            phone: formData.phone,
                            address: formData.address,
                            song: formData.song || 'Not provided',
                            movie: formData.movie || 'Not provided',
                            message: formData.message || 'No additional message',
                            timestamp: formData.timestamp,
                            user_agent: formData.userAgent
                        }
                    );
                    
                    if (response.status === 200) {
                        hideLoading();
                        showSuccess();
                        form.reset();
                        
                        // Log to console for debugging
                        console.log('Form submitted successfully:', formData);
                    } else {
                        throw new Error('Failed to send email');
                    }
                    
                } catch (error) {
                    console.error('Error sending email:', error);
                    hideLoading();
                    showError('Failed to submit. Please try again later.');
                    
                    // Fallback: Log to console and show success message anyway
                    console.log('Form data (for manual processing):', {
                        name: document.getElementById('name').value.trim(),
                        phone: document.getElementById('phone').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        address: document.getElementById('address').value.trim(),
                        message: document.getElementById('message').value.trim(),
                        timestamp: new Date().toISOString()
                    });
                }
            });
            
            function validateForm() {
                let isValid = true;
                
                // Reset errors
                [nameError, phoneError, addressError, songError, movieError].forEach(error => {
                    error.style.display = 'none';
                });
                
                // Validate name
                const name = document.getElementById('name').value.trim();
                if (!name) {
                    nameError.textContent = 'cậu chưa nhập tên kìa cậu';
                    nameError.style.display = 'block';
                    isValid = false;
                }
                
                // Validate phone
                const phone = document.getElementById('phone').value.trim();
                if (!phone) {
                    phoneError.textContent = 'ô ne điền số điện thoại !!!';
                    phoneError.style.display = 'block';
                    isValid = false;
                } else if (!isValidPhone(phone)) {
                    phoneError.textContent = 'ô ne nhập số điện thoại hợp lệ !!!';
                    phoneError.style.display = 'block';
                    isValid = false;
                }
                
                // Validate address
                const address = document.getElementById('address').value.trim();
                if (!address) {
                    addressError.textContent = 'ô ne điền địa chỉ !!!';
                    addressError.style.display = 'block';
                    isValid = false;
                }
                
                return isValid;
            }
            
            function isValidPhone(phone) {
                const phoneRegex = /^[\+]?[0-9\s\-\(\)]{10,}$/;
                return phoneRegex.test(phone.replace(/\s/g, ''));
            }
            
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
            
            function showLoading() {
                submitBtn.disabled = true;
                loading.style.display = 'block';
                successMessage.style.display = 'none';
                errorMessage.style.display = 'none';
            }
            
            function hideLoading() {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
            
            function showSuccess() {
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
                
                // Hide success message after 5 seconds
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 5000);
            }
            
            function showError(messageText) {
                errorMessage.textContent = messageText;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                
                // Hide error message after 5 seconds
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 5000);
            }
            
            // Real-time validation
            const inputs = document.querySelectorAll('input[required], textarea[required]');
            inputs.forEach(input => {
                input.addEventListener('blur', function() {
                    validateForm();
                });
            });
        });
    </script>
    
    <!-- Backup script for EmailJS setup instructions -->
    <script>
        // Instructions for setting up EmailJS
        window.onload = function() {
            // Check if EmailJS is configured
            if (typeof emailjs === 'undefined') {
                console.warn('EmailJS not loaded. Please add EmailJS script.');
            }
            
            // Instructions in console
            console.log(`
            ============================================
            EMAILJS SETUP INSTRUCTIONS:
            
            1. Sign up at https://www.emailjs.com/
            2. Get your Public Key from Dashboard
            3. Create an Email Service (Gmail recommended)
            4. Create an Email Template
            5. Update the script with your details:
               - YOUR_PUBLIC_KEY
               - YOUR_SERVICE_ID
               - YOUR_TEMPLATE_ID
               - YOUR_EMAIL@example.com
            6. Deploy to GitHub Pages
            ============================================
            `);
        };
    </script>
</body>
</html>
